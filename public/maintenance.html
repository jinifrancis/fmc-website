<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance — Fathima Matha Church</title>
    <link rel="icon" type="image/png" href="/assets/images/fmc_logo.png">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f0e6;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: #2a2a2a;
        padding: 24px;
      }

      .container {
        text-align: center;
        max-width: 520px;
      }

      .icon {
        font-size: 3.5rem;
        margin-bottom: 16px;
      }

      .church-name {
        font-family: Georgia, serif;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #4a7a5a;
        margin-bottom: 32px;
      }

      h1 {
        font-family: Georgia, serif;
        font-size: 2.2rem;
        font-weight: 400;
        color: #1a3a2a;
        margin-bottom: 16px;
      }

      .message {
        font-size: 1.05rem;
        line-height: 1.7;
        color: #555;
        margin-bottom: 32px;
      }

      .divider {
        width: 60px;
        height: 2px;
        background: #b8840a;
        margin: 0 auto 32px;
      }

      .contact {
        font-size: 0.9rem;
        color: #777;
      }

      .contact a {
        color: #4a7a5a;
        text-decoration: none;
      }

      .contact a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">+</div>
      <div class="church-name">Fathima Matha Church</div>
      <h1>We'll Be Back Soon</h1>
      <p class="message">
        Our website is currently undergoing scheduled maintenance.
        We expect to be back online shortly. Thank you for your patience.
      </p>
      <div class="divider"></div>
      <p class="contact">
        For urgent enquiries, please contact us at
        <a href="mailto:fmcwestkoratty@gmail.com">fmcwestkoratty@gmail.com</a>
      </p>
    </div>

    <!-- If maintenance mode is NOT active (someone visited this URL directly), redirect to homepage -->
    <script>
      if (window.location.pathname === '/maintenance.html') {
        window.location.replace('/');
      }
    </script>
  </body>
</html>
