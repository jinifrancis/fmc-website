[build]
  command = "npm run build"
  publish = "dist"

# ── Maintenance Mode ─────────────────────────────────────
# Uncomment the 4 lines below to enable maintenance mode.
# Commit & push — Netlify will redirect ALL traffic to the
# maintenance page within ~30 seconds.
# Re-comment and push again to disable.
#
# [[redirects]]
#   from = "/*"
#   to = "/maintenance.html"
#   status = 503
#   force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co; frame-src https://www.google.com/maps/;"
